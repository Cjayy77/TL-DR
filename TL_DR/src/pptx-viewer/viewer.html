<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>TL;DR — PPTX Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #1A7E5D; --bar-h: 44px; }
    body { background: #3a3a3a; font-family: Georgia, serif; min-height: 100vh; }

    /* Toolbar */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
      background: #222; color: #ddd; display: flex; align-items: center;
      gap: 10px; padding: 0 14px; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #toolbar .brand { font-size: 13px; font-weight: 700; font-style: italic; color: var(--accent); margin-right: 6px; }
    #toolbar button {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: #ccc; border-radius: 6px; padding: 4px 10px; cursor: pointer;
      font-family: Georgia, serif; font-size: 12px;
    }
    #toolbar button:hover { background: rgba(255,255,255,0.15); }
    #slide-info { font-size: 12px; color: #aaa; margin-left: auto; }
    #filename   { font-size: 11px; color: #888; font-style: italic; max-width: 260px;
                  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Slide area */
    #viewer {
      padding-top: calc(var(--bar-h) + 20px);
      padding-bottom: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    .slide-wrap {
      background: white;
      width: min(860px, 92vw);
      min-height: 200px;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      padding: 40px 52px 44px;
      position: relative;
    }
    .slide-num {
      position: absolute; top: 10px; right: 14px;
      font-size: 10px; color: #bbb; font-style: italic;
    }
    .slide-title {
      font-size: 22px; font-weight: 700; color: #1a1a18;
      margin-bottom: 16px; line-height: 1.3;
    }
    .slide-body {
      font-size: 14px; color: #2c2c2a; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
    }
    .slide-body p { margin-bottom: 8px; }

    /* Status */
    #status {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #aaa; font-size: 15px; font-style: italic;
    }
    #error-box {
      display: none; background: rgba(180,40,40,0.12); border: 1px solid rgba(180,40,40,0.3);
      border-radius: 10px; padding: 18px 24px; color: #f88; font-size: 13px;
      max-width: 480px; text-align: center; margin: 80px auto;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <span class="brand">TL;DR</span>
  <button id="prevBtn">&#8592; Prev</button>
  <button id="nextBtn">Next &#8594;</button>
  <span id="filename">loading…</span>
  <span id="slide-info"></span>
</div>

<div id="viewer"></div>
<div id="status">Loading presentation…</div>
<div id="error-box"></div>

<script>
(async () => {
  const params  = new URLSearchParams(location.search);
  const fileUrl = params.get('src');
  if (!fileUrl) { showError('No PPTX source specified.'); return; }

  document.getElementById('filename').textContent =
    decodeURIComponent(fileUrl.split('/').pop() || fileUrl);

  // ── Load JSZip ────────────────────────────────────────────────────────
  const jszipUrl = chrome.runtime.getURL('src/libs/jszip.min.js');
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = jszipUrl; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });

  // ── Fetch and parse PPTX ──────────────────────────────────────────────
  let slides = [];
  try {
    const resp = await fetch(fileUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const ab  = await resp.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);

    const slideFiles = Object.keys(zip.files)
      .filter(k => /^ppt\/slides\/slide\d+\.xml$/i.test(k))
      .sort((a, b) => {
        const na = parseInt(a.match(/\d+/)?.[0] || 0);
        const nb = parseInt(b.match(/\d+/)?.[0] || 0);
        return na - nb;
      });

    for (const sf of slideFiles) {
      const xml = await zip.files[sf].async('string');
      slides.push(parseSlide(xml));
    }
  } catch (e) {
    showError(`Could not load PPTX: ${e.message}<br><br>
      Make sure "Allow access to file URLs" is enabled for TL;DR in <code>chrome://extensions</code>.`);
    return;
  }

  if (!slides.length) {
    showError('No slides found in this file. The PPTX may be empty or use an unsupported format.');
    return;
  }

  document.getElementById('status').style.display = 'none';
  slides.forEach((slide, i) => renderSlide(slide, i + 1, slides.length));
  updateInfo(1, slides.length);

  // ── Parse a slide's XML into { title, body } ──────────────────────────
  function parseSlide(xml) {
    // Extract all text runs from the XML
    const allTexts = [];
    const matches  = [...xml.matchAll(/<a:t[^>]*>([\s\S]*?)<\/a:t>/g)];
    let   current  = [];

    // Group by paragraph (<a:p>...</a:p>)
    const paras = [...xml.matchAll(/<a:p\b[^>]*>([\s\S]*?)<\/a:p>/g)];
    const paraTexts = paras.map(m => {
      const runs = [...m[1].matchAll(/<a:t[^>]*>([\s\S]*?)<\/a:t>/g)];
      return runs.map(r => r[1]).join('').trim();
    }).filter(Boolean);

    // First non-empty para is the title if it has a distinct sp type or is short
    let title = '', body = [];
    if (paraTexts.length > 0) {
      title = paraTexts[0];
      body  = paraTexts.slice(1);
    }

    return { title, body };
  }

  // ── Render a slide as a DOM card ──────────────────────────────────────
  function renderSlide(slide, num, total) {
    const wrap = document.createElement('div');
    wrap.className = 'slide-wrap';
    wrap.dataset.slide = num;

    const numEl = document.createElement('div');
    numEl.className = 'slide-num';
    numEl.textContent = `${num} / ${total}`;

    const titleEl = document.createElement('div');
    titleEl.className = 'slide-title';
    titleEl.textContent = slide.title || `Slide ${num}`;

    const bodyEl = document.createElement('div');
    bodyEl.className = 'slide-body';
    slide.body.forEach(line => {
      const p = document.createElement('p');
      p.textContent = line;
      bodyEl.appendChild(p);
    });

    wrap.appendChild(numEl);
    wrap.appendChild(titleEl);
    wrap.appendChild(bodyEl);
    document.getElementById('viewer').appendChild(wrap);
  }

  // ── Navigation ────────────────────────────────────────────────────────
  let current = 1;
  function scrollTo(num) {
    const el = document.querySelector(`[data-slide="${num}"]`);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); current = num; updateInfo(num, slides.length); }
  }
  document.getElementById('prevBtn').onclick = () => { if (current > 1) scrollTo(current - 1); };
  document.getElementById('nextBtn').onclick = () => { if (current < slides.length) scrollTo(current + 1); };

  // Update current slide as user scrolls
  const obs = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting) {
        current = Number(e.target.dataset.slide) || current;
        updateInfo(current, slides.length);
      }
    }
  }, { threshold: 0.5 });
  new MutationObserver(() => {
    document.querySelectorAll('.slide-wrap:not([data-observed])').forEach(el => {
      obs.observe(el); el.dataset.observed = '1';
    });
  }).observe(document.getElementById('viewer'), { childList: true });

  function updateInfo(cur, total) {
    document.getElementById('slide-info').textContent = `Slide ${cur} of ${total}`;
  }

  function showError(msg) {
    document.getElementById('status').style.display = 'none';
    const box = document.getElementById('error-box');
    box.innerHTML = msg; box.style.display = 'block';
  }
})();
</script>

</body>
</html>

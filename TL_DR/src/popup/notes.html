<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TL;DR — My Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#FAFAF7; --surface:#FFFFFF; --border:rgba(26,126,93,0.14);
  --text:#2c2c2a; --muted:#7a7a72; --accent:#1A7E5D; --accent2:#0f5c42;
  --gold:#C8A54B; --serif:'Merriweather',Georgia,serif; --danger:#c0392b;
}
body { background:var(--bg); color:var(--text); font-family:var(--serif); min-height:100vh; }

.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:18px 32px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:10;
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo-img { width:32px; height:32px; border-radius:8px; }
.logo-text { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
.logo-sub  { font-size:12px; color:var(--muted); font-style:italic; }
.header-right { display:flex; align-items:center; gap:10px; }

.btn {
  padding:8px 16px; border-radius:8px; border:none; cursor:pointer;
  font-family:var(--serif); font-size:13px; transition:opacity 0.15s,transform 0.12s;
}
.btn:hover { opacity:0.85; transform:translateY(-1px); }
.btn-primary   { background:var(--accent); color:white; }
.btn-ghost     { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-danger    { background:transparent; color:var(--danger); border:1px solid rgba(192,57,43,0.2); }
.btn-danger:hover { background:rgba(192,57,43,0.06); }

.container { max-width:860px; margin:0 auto; padding:32px 24px; }

.stats-bar {
  display:flex; align-items:center; gap:24px; margin-bottom:28px;
  padding:14px 20px; background:var(--surface);
  border:1px solid var(--border); border-radius:12px;
}
.stat { display:flex; flex-direction:column; gap:2px; }
.stat-value { font-size:22px; font-weight:700; color:var(--accent); }
.stat-label { font-size:11px; color:var(--muted); font-style:italic; }
.stats-divider { width:1px; height:36px; background:var(--border); }
.search-wrap { flex:1; }
.search-input {
  width:100%; padding:8px 14px; border-radius:8px;
  border:1px solid var(--border); background:var(--bg);
  font-family:var(--serif); font-size:13px; color:var(--text); outline:none;
}
.search-input:focus { border-color:var(--accent); }

.filter-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.filter-tab {
  padding:5px 14px; border-radius:20px; border:1px solid var(--border);
  background:transparent; font-family:var(--serif); font-size:12px;
  font-style:italic; color:var(--muted); cursor:pointer; transition:all 0.15s;
}
.filter-tab:hover  { border-color:var(--accent); color:var(--accent); }
.filter-tab.active { background:var(--accent); color:white; border-color:var(--accent); }

.empty { text-align:center; padding:80px 20px; color:var(--muted); }
.empty-icon  { font-size:48px; margin-bottom:16px; }
.empty-title { font-size:18px; font-weight:700; margin-bottom:8px; color:var(--text); }
.empty-sub   { font-size:14px; font-style:italic; }

.notes-grid { display:flex; flex-direction:column; gap:14px; }

.note-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px 20px; transition:border-color 0.15s,box-shadow 0.15s;
  position:relative;
}
.note-card:hover { border-color:rgba(26,126,93,0.3); box-shadow:0 2px 12px rgba(26,126,93,0.07); }
.note-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
.note-meta   { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.note-badge {
  font-size:10px; font-style:italic; padding:2px 8px; border-radius:4px;
  border:1px solid var(--border); color:var(--accent); background:rgba(26,126,93,0.06);
}
.note-badge.selection    { color:#2563a8; border-color:rgba(37,99,168,0.2);  background:rgba(37,99,168,0.06); }
.note-badge.confused     { color:#a06000; border-color:rgba(160,96,0,0.2);   background:rgba(160,96,0,0.06); }
.note-badge.overloaded   { color:#8b2000; border-color:rgba(139,32,0,0.2);   background:rgba(139,32,0,0.06); }
.note-badge.explain_code { color:#5a3e8a; border-color:rgba(90,62,138,0.2);  background:rgba(90,62,138,0.06); }

.note-date { font-size:11px; color:var(--muted); font-style:italic; }
.note-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.15s; }
.note-card:hover .note-actions { opacity:1; }
.note-action-btn {
  width:28px; height:28px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all 0.12s;
}
.note-action-btn:hover       { border-color:var(--accent); color:var(--accent); background:rgba(26,126,93,0.05); }
.note-action-btn.delete:hover { border-color:var(--danger); color:var(--danger); background:rgba(192,57,43,0.05); }

.note-text {
  font-size:14px; line-height:1.7; color:var(--text);
  overflow:hidden; display:-webkit-box;
  -webkit-line-clamp:4; -webkit-box-orient:vertical;
}
.note-text.expanded { -webkit-line-clamp:unset; }
.note-expand-btn {
  background:none; border:none; color:var(--accent);
  font-family:var(--serif); font-size:12px; font-style:italic;
  cursor:pointer; margin-top:6px; padding:0;
}
.note-source {
  margin-top:10px; padding-top:10px; border-top:1px solid var(--border);
  font-size:11px; color:var(--muted); font-style:italic;
}

.toast {
  position:fixed; bottom:24px; right:24px; background:var(--text);
  color:white; padding:10px 18px; border-radius:8px;
  font-size:13px; font-style:italic; z-index:100;
  opacity:0; transform:translateY(8px);
  transition:opacity 0.2s,transform 0.2s; pointer-events:none;
}
.toast.show { opacity:1; transform:none; }
.loading { text-align:center; padding:60px; color:var(--muted); font-style:italic; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img id="logo-img" class="logo-img" src="../assets/tldr.png" alt="TL;DR">
    <div>
      <div class="logo-text">TL;DR</div>
      <div class="logo-sub">My Saved Notes</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" id="exportBtn">Export JSON</button>
    <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
    <button class="btn btn-primary" id="doneBtn">Done</button>
  </div>
</header>

<div class="container">
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="totalCount">0</span>
      <span class="stat-label">total notes</span>
    </div>
    <div class="stats-divider"></div>
    <div class="stat">
      <span class="stat-value" id="todayCount">0</span>
      <span class="stat-label">saved today</span>
    </div>
    <div class="stats-divider"></div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="Search notes...">
    </div>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="selection">Selections</button>
    <button class="filter-tab" data-filter="gaze">Eye-triggered</button>
    <button class="filter-tab" data-filter="explain_code">Code</button>
  </div>

  <div id="notesContainer">
    <div class="loading">Loading notes...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="notes.js"></script>
</body>
</html>
